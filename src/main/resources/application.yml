spring:
  application:
    name: games-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${SERVER_PORT:8080}

games:
  redis:
    state-ttl-minutes: ${GAME_STATE_TTL_MINUTES:120}

---
# ---------- LOCAL: run from IDE / mvnw; postgres + redis on localhost ----------
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/games_db}
    username: ${DB_USERNAME:games}
    password: ${DB_PASSWORD:games}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update          # MVP convenience: Hibernate creates/updates the schema from entities
    show-sql: true
    open-in-view: false         # disable the Open-Session-In-View anti-pattern explicitly
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.utibunna.games: DEBUG

---
# ---------- DOCKER: compose service names as hosts ----------
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/games_db}
    username: ${DB_USERNAME:games}
    password: ${DB_PASSWORD:games}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.utibunna.games: INFO
